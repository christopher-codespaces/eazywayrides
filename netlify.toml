[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_PRIVATE_KEY,FIREBASE_CLIENT_EMAIL,FIREBASE_PROJECT_ID,PAYFAST_PASSPHRASE,PAYFAST_MERCHANT_KEY,PAYFAST_MERCHANT_ID,NEXTAUTH_SECRET,OPENROUTER_API_KEY,GOOGLE_CLIENT_SECRET"

[[plugins]]
  package = "@netlify/plugin-nextjs"
